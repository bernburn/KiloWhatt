<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>KILOWHATT?</title>
    <link rel="stylesheet" href="dist/output.css" />
    <link rel="icon" href="./assets/LOGO.png" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>

  <body>
    <header class="flex items-center justify-center gap-3 pt-10 pb-4">
      <img src="./assets/LOGO.png" width="50" alt="Logo" />
      <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-primary">KILOWHATT?</h1>
    </header>
    <div class="w-full max-w-7xl mx-auto px-4 py-4 md:pb-12">
      <main class="grid grid-cols-1 lg:grid-cols-[1.2fr,1fr] gap-6">
        <section class="bg-white rounded-3xl p-8 border border-slate-200 shadow-xl">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-primary">Appliances</h2>
            <button id="resetRows" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-semibold transition">Reset</button>
          </div>

          <div class="mb-4">
            <button
              id="globalAdvancedToggle"
              class="w-full flex items-center justify-between px-4 py-3 bg-white border border-slate-200 rounded-xl font-semibold transition hover:border-accent"
              type="button"
              aria-expanded="false"
            >
              Advanced Options
              <span class="chevron">▼</span>
            </button>
            <div
              id="globalAdvancedSection"
              class="hidden mt-3 p-4 border border-dashed border-slate-300 rounded-xl bg-slate-50"
              aria-hidden="true"
            >
              <div class="mb-3">
                <label for="global-rate" class="block text-sm font-semibold mb-2">Utility Rate (PHP/kWh)</label>
                <input
                  type="number"
                  id="global-rate"
                  min="0"
                  step="0.01"
                  value="13.4702"
                  class="w-full p-3 rounded-xl border border-slate-200"
                />
              </div>
              <div>
                <label for="global-voltage" class="block text-sm font-semibold mb-2">Voltage Region</label>
                <select id="global-voltage" class="w-full p-3 rounded-xl border border-slate-200"></select>
              </div>
            </div>
          </div>

          <div id="appliance-list" class="flex flex-col gap-4" aria-live="polite"></div>

          <div class="mt-8 pt-6 border-t border-dashed border-slate-200">
            <div id="validationMessage" class="text-red-500 font-semibold text-sm mb-4" aria-live="assertive"></div>
            <div class="flex flex-wrap gap-3">
              <button id="generateButton" class="px-6 py-3 bg-gradient-to-r from-accent to-accent-strong text-primary rounded-xl font-bold shadow-lg shadow-yellow-500/20 transition hover:-translate-y-0.5">
                Generate Report
              </button>
              <button id="addRow" class="px-6 py-3 bg-primary text-white rounded-xl font-bold shadow-lg transition hover:-translate-y-0.5">
                + Add Appliance
              </button>
            </div>
          </div>
        </section>

        <section class="bg-white rounded-3xl p-8 border border-slate-200 shadow-xl">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-primary">Analysis Preview</h2>
            <div class="text-sm text-slate-500">Calculations use 30 days/month</div>
          </div>
          <div id="analysisArea" class="space-y-4"></div>
        </section>
        
        <div class="lg:col-span-2 bg-white rounded-3xl p-8 border border-slate-200 shadow-xl">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold text-primary">Gemini Output</h2>
            <button id="downloadGeminiOutput" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-semibold transition">
              Save as PDF
            </button>
          </div>

          <div id="geminiArea" class="mt-4">
            <div class="p-6 bg-slate-50 rounded-2xl border border-slate-200">
              <div class="leading-relaxed" id="geminiContent">
                No output yet. Press Generate to send inputs to the server and
                receive Gemini's output here.
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
    <script type="module" src="index.js"></script>
  </body>
</html>
